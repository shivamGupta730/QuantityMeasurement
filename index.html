<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Measurement</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-icons">
    <div class="container">
        <header>
            <h1><i class="fas fa-ruler-combined"></i> Welcome To Quantity Measurement</h1>
        </header>

        <div class="type-selection">
            <div class="type-card active" data-type="length">
                <i class="fas fa-ruler"></i>
                <span>Length</span>
            </div>
            <div class="type-card" data-type="weight">
                <i class="fas fa-weight-hanging"></i>
                <span>Weight</span>
            </div>
            <div class="type-card" data-type="temperature">
                <i class="fas fa-thermometer-half"></i>
                <span>Temperature</span>
            </div>
            <div class="type-card" data-type="volume">
                <i class="fas fa-flask"></i>
                <span>Volume</span>
            </div>
        </div>

        <div class="action-buttons" id="action-buttons-container">
            <button class="action-btn active" data-action="convert" onclick="switchAction('convert')">
                <i class="fas fa-exchange-alt"></i> Conversion
            </button>
            <button class="action-btn" data-action="add" onclick="switchAction('add')">
                <i class="fas fa-plus"></i> Addition
            </button>
            <button class="action-btn" data-action="subtract" onclick="switchAction('subtract')">
                <i class="fas fa-minus"></i> Subtraction
            </button>
            <button class="action-btn" data-action="compare" onclick="switchAction('compare')">
                <i class="fas fa-balance-scale"></i> Comparison
            </button>
        </div>

        <div class="converter-form">
            <!-- Conversion Form -->
            <div id="convert-form" class="form-section active">
                <div class="input-group">
                    <label>From:</label>
                    <input type="number" id="convert-from-value" placeholder="Enter value" step="any">
                    <select id="convert-from-unit"></select>
                </div>
                <div class="arrow"><i class="fas fa-arrow-down"></i></div>
                <div class="input-group">
                    <label>To:</label>
                    <span id="convert-to-value" class="result-display">Select units to see conversion</span>
                    <select id="convert-to-unit"></select>
                </div>
            </div>

            <!-- Addition Form -->
            <div id="add-form" class="form-section">
                <div class="input-group">
                    <label>Value 1:</label>
                    <input type="number" id="add-value1" placeholder="Enter value 1" step="any">
                    <select id="add-unit1"></select>
                </div>
                <div class="plus">+</div>
                <div class="input-group">
                    <label>Value 2:</label>
                    <input type="number" id="add-value2" placeholder="Enter value 2" step="any">
                    <select id="add-unit2"></select>
                </div>
                <div class="arrow"><i class="fas fa-equals"></i></div>
                <div class="input-group">
                    <label>Result in:</label>
                    <span id="add-result" class="result-display">Select units to see result</span>
                    <select id="add-target-unit"></select>
                </div>
            </div>

            <!-- Subtraction Form -->
            <div id="subtract-form" class="form-section">
                <div class="input-group">
                    <label>Value 1:</label>
                    <input type="number" id="subtract-value1" placeholder="Enter value 1" step="any">
                    <select id="subtract-unit1"></select>
                </div>
                <div class="minus">-</div>
                <div class="input-group">
                    <label>Value 2:</label>
                    <input type="number" id="subtract-value2" placeholder="Enter value 2" step="any">
                    <select id="subtract-unit2"></select>
                </div>
                <div class="arrow"><i class="fas fa-equals"></i></div>
                <div class="input-group">
                    <label>Result in:</label>
                    <span id="subtract-result" class="result-display">Select units to see result</span>
                    <select id="subtract-target-unit"></select>
                </div>
            </div>

            <!-- Comparison Form -->
            <div id="compare-form" class="form-section">
                <div class="input-group">
                    <label>Value 1:</label>
                    <input type="number" id="compare-value1" placeholder="Enter value 1" step="any">
                    <select id="compare-unit1"></select>
                </div>
                <div class="plus">vs</div>
                <div class="input-group">
                    <label>Value 2:</label>
                    <input type="number" id="compare-value2" placeholder="Enter value 2" step="any">
                    <select id="compare-unit2"></select>
                </div>
                <div class="arrow"><i class="fas fa-equals"></i></div>
                <div class="input-group">
                    <label>Result:</label>
                    <span id="compare-result" class="result-display">Enter values to compare</span>
                </div>
            </div>
        </div>

        <button class="calculate-btn" onclick="calculate()">
            <i class="fas fa-calculator"></i> Calculate
        </button>

        <!-- NEW: Main Result Display Area -->
        <div id="main-result-box" class="result-box hidden">
            Result will appear here
        </div>

        <div id="loading" class="loading hidden">
            <i class="fas fa-spinner fa-spin"></i> Calculating...
        </div>
        <div id="error" class="error hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
